<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduLogNBS — Sistem Perangkat Mengajar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .role-btn {
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .role-btn.active {
            background: linear-gradient(105deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            box-shadow: 0 8px 20px -6px #4f46e5;
        }
        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
            border-color: #4f46e5;
        }
        .login-btn {
            background: linear-gradient(100deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.2s;
        }
        .login-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 15px 25px -12px #5b21b6;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-5">
    <div class="relative z-10 w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-6 animate-float">
            <div class="inline-flex items-center justify-center bg-white/10 backdrop-blur-sm p-4 rounded-3xl shadow-lg border border-white/20 mb-2">
                <i class="fas fa-chalkboard-user text-5xl text-white drop-shadow-md"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-white tracking-tight mt-3">EduLog<span class="font-light">NBS</span></h1>
            <p class="text-indigo-200 text-sm mt-1 font-medium">Sistem Perangkat Mengajar Digital</p>
        </div>

        <!-- Kartu Login -->
        <div class="glass-card p-6 md:p-8 w-full border border-white/40">
            <div class="text-center mb-5">
                <span class="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-700 text-xs font-semibold"><i class="fas fa-lock mr-1"></i> PORTAL AKSES</span>
                <h2 class="text-2xl font-bold text-gray-800 mt-3">Masuk ke Akun</h2>
                <p class="text-gray-500 text-sm mt-1">Pilih peran dan masukkan kredensial</p>
            </div>

            <!-- Role Switcher -->
            <div class="flex bg-gray-100/80 p-1.5 rounded-2xl gap-1.5 mb-6">
                <button id="btnAdmin" class="role-btn flex-1 py-2.5 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2 bg-white text-gray-700">
                    <i class="fas fa-user-shield"></i> Admin
                </button>
                <button id="btnGuru" class="role-btn flex-1 py-2.5 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2 bg-white text-gray-700">
                    <i class="fas fa-chalkboard-user"></i> Guru
                </button>
                <button id="btnSiswa" class="role-btn flex-1 py-2.5 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2 bg-white text-gray-700">
                    <i class="fas fa-graduation-cap"></i> Siswa
                </button>
            </div>

            <!-- Form -->
            <div class="space-y-4">
                <div>
                    <label id="usernameLabel" class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-2">
                        <i class="fas fa-user-circle text-indigo-500"></i> Username (Admin)
                    </label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" id="username" placeholder="admin" 
                               class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none input-focus transition bg-gray-50 focus:bg-white">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-2">
                        <i class="fas fa-key text-indigo-500"></i> Password
                    </label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" id="password" placeholder="Masukkan password" 
                               class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none input-focus transition bg-gray-50 focus:bg-white">
                    </div>
                </div>

                <button id="loginBtn" class="login-btn w-full text-white font-bold py-3 rounded-xl mt-2 shadow-lg flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-arrow-right-to-bracket"></i> Masuk ke Dashboard
                </button>
                
                <p id="errorMsg" class="text-red-600 text-sm text-center mt-3 hidden bg-red-50 py-2 rounded-lg border border-red-100"></p>
            </div>
            
            <div class="mt-6 text-center text-xs text-gray-400 border-t pt-4">
                <i class="far fa-shield-alt mr-1"></i> Sistem aman & terenkripsi
            </div>
        </div>
    </div>

    <script>
        // ========== KONFIGURASI FIREBASE (SAMA PERSIS DENGAN ASLI) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAEUxtP2D26eF5zS2sgR5_bpzK6SNRwQA0",
            authDomain: "edulognbs.firebaseapp.com",
            databaseURL: "https://edulognbs-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "edulognbs",
            storageBucket: "edulognbs.firebasestorage.app",
            messagingSenderId: "759345868898",
            appId: "1:759345868898:web:40487df20ab4f43045213b",
            measurementId: "G-SV83KDGZTS"
        };
        // Pastikan inisialisasi hanya sekali
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        // ====================================================================

        // Variabel role
        let selectedRole = 'admin';
        
        // Ambil elemen setelah DOM siap
        document.addEventListener('DOMContentLoaded', function() {
            const btnAdmin = document.getElementById('btnAdmin');
            const btnGuru = document.getElementById('btnGuru');
            const btnSiswa = document.getElementById('btnSiswa');
            const usernameLabel = document.getElementById('usernameLabel');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            // Fungsi update UI role
            function setActiveRole(role) {
                selectedRole = role;
                // Reset class active
                [btnAdmin, btnGuru, btnSiswa].forEach(btn => btn.classList.remove('active'));
                if (role === 'admin') {
                    btnAdmin.classList.add('active');
                    usernameLabel.innerHTML = '<i class="fas fa-user-cog text-indigo-500"></i> Username (Admin)';
                    usernameInput.placeholder = 'admin';
                    usernameInput.value = '';
                } else if (role === 'guru') {
                    btnGuru.classList.add('active');
                    usernameLabel.innerHTML = '<i class="fas fa-chalkboard-user text-indigo-500"></i> Nama Guru';
                    usernameInput.placeholder = 'Nama Guru (contoh: Bu Susi)';
                    usernameInput.value = '';
                } else {
                    btnSiswa.classList.add('active');
                    usernameLabel.innerHTML = '<i class="fas fa-id-card text-indigo-500"></i> NIS (Nomor Induk Siswa)';
                    usernameInput.placeholder = 'Masukkan NIS';
                    usernameInput.value = '';
                }
                errorMsg.classList.add('hidden');
                passwordInput.value = '';
            }

            // Event listener role
            btnAdmin.onclick = () => setActiveRole('admin');
            btnGuru.onclick = () => setActiveRole('guru');
            btnSiswa.onclick = () => setActiveRole('siswa');

            // Fungsi login (logika asli, tidak diubah)
            async function handleLogin() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                errorMsg.classList.add('hidden');
                
                if (!username || !password) {
                    errorMsg.innerText = '❌ Semua field harus diisi!';
                    errorMsg.classList.remove('hidden');
                    return;
                }
                
                if (selectedRole === 'admin') {
                    // Admin static
                    if (username === 'admin' && password === 'admin123') {
                        window.location.href = 'admin.html';
                    } else {
                        errorMsg.innerText = '❌ Username atau password admin salah!';
                        errorMsg.classList.remove('hidden');
                    }
                } 
                else if (selectedRole === 'guru') {
                    try {
                        const snapshot = await db.ref(`guru/${username}`).once('value');
                        const guru = snapshot.val();
                        if (guru && guru.password === password) {
                            localStorage.setItem('guruLogin', username);
                            window.location.href = 'guru.html';
                        } else {
                            errorMsg.innerText = '❌ Nama Guru atau password tidak cocok!';
                            errorMsg.classList.remove('hidden');
                        }
                    } catch (err) {
                        console.error(err);
                        errorMsg.innerText = '⚠️ Gagal koneksi database. Coba lagi.';
                        errorMsg.classList.remove('hidden');
                    }
                }
                else if (selectedRole === 'siswa') {
                    try {
                        const snapshot = await db.ref(`siswa/${username}`).once('value');
                        const siswa = snapshot.val();
                        if (siswa && siswa.password === password) {
                            localStorage.setItem('siswaLogin', username);
                            window.location.href = 'murid.html';
                        } else {
                            errorMsg.innerText = '❌ NIS atau password salah!';
                            errorMsg.classList.remove('hidden');
                        }
                    } catch (err) {
                        console.error(err);
                        errorMsg.innerText = '⚠️ Gagal memverifikasi data siswa.';
                        errorMsg.classList.remove('hidden');
                    }
                }
            }

            loginBtn.onclick = handleLogin;
            
            // Enter key event
            const enterHandler = (e) => { if (e.key === 'Enter') handleLogin(); };
            usernameInput.addEventListener('keypress', enterHandler);
            passwordInput.addEventListener('keypress', enterHandler);
            
            // Set default role admin
            setActiveRole('admin');
            usernameInput.focus();
        });
    </script>
</body>
</html>
