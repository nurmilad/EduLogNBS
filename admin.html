        // Helper: parse dd/mm/yyyy ke timestamp (midnight)
        function parseDMY(dateStr) {
            if (!dateStr) return null;
            let parts = dateStr.split('/');
            if (parts.length === 3) {
                let d = parseInt(parts[0],10), m = parseInt(parts[1],10)-1, y = parseInt(parts[2],10);
                let date = new Date(y,m,d);
                if (!isNaN(date.getTime())) return date.getTime();
            }
            return null;
        }
        
        function formatDateToDMY(date) {
            let d = date.getDate().toString().padStart(2,'0');
            let m = (date.getMonth()+1).toString().padStart(2,'0');
            let y = date.getFullYear();
            return `${d}/${m}/${y}`;
        }
        
        // Tab switching
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-link').forEach(btn => {

        // ===================== DATA MURID dengan sinkronisasi kehadiran & nilai (default H) =====================
        async function hitungSemuaStatistikSiswa() {
            const [penugasanSnap, attendanceSnap, penilaianSnap] = await Promise.all([
                db.ref('penugasan').once('value'),
                db.ref('attendance').once('value'),
                db.ref('penilaian').once('value')
            ]);
            const penugasan = penugasanSnap.val() || {};
            const attendanceAll = attendanceSnap.val() || {};
            const penilaianAll = penilaianSnap.val() || {};
            
            const penugasanPerSiswa = {};
            for (let [idPen, pg] of Object.entries(penugasan)) {
                if (pg.siswaList && Array.isArray(pg.siswaList)) {
                    for (let nis of pg.siswaList) {
                        if (!penugasanPerSiswa[nis]) penugasanPerSiswa[nis] = [];
                        penugasanPerSiswa[nis].push(idPen);
                    }
                }
            }
            
            const assessmentPerPenugasan = {};
            for (let [idPen, assessments] of Object.entries(penilaianAll)) {
                if (!assessmentPerPenugasan[idPen]) assessmentPerPenugasan[idPen] = [];
                for (let idAss of Object.keys(assessments)) {
                    assessmentPerPenugasan[idPen].push(idAss);
                }
            }
            
            const hasil = {};
            for (let [nis, listPen] of Object.entries(penugasanPerSiswa)) {
                let totalSesi = 0;
                let totalHadir = 0;
                for (let idPen of listPen) {
                    const sessions = attendanceAll[idPen] || {};
                    for (let ses of Object.values(sessions)) {
                        totalSesi++;
                        const status = ses.records?.[nis];
                        if (status === undefined || status === 'H') totalHadir++;
                    }
                }
                const kehadiranPersen = totalSesi === 0 ? 0 : Math.round((totalHadir / totalSesi) * 100);
                
                let totalNilai = 0;
                let jumlahAssessment = 0;
                for (let idPen of listPen) {
                    const listAss = assessmentPerPenugasan[idPen] || [];
                    for (let idAss of listAss) {
                        const nilai = penilaianAll[idPen]?.[idAss]?.scores?.[nis];
                        const nilaiFinal = (typeof nilai === 'number') ? nilai : 0;
                        totalNilai += nilaiFinal;
                        jumlahAssessment++;
                    }
                }
                const nilaiRata = jumlahAssessment === 0 ? 0 : Math.round(totalNilai / jumlahAssessment);
                hasil[nis] = { kehadiranPersen, nilaiRata };
            }
            return hasil;
        }
        
        async function loadMuridListView() {
            const container = document.getElementById('murid');
            container.innerHTML = `
                <div class="mb-4 flex justify-between items-center flex-wrap gap-2">
                    <button id="addKelasBtn" class="bg-green-500 text-white px-3 py-2 rounded text-sm"><i class="fas fa-plus"></i> Tambah Kelas</button>
                </div>
                <div id="kelasListGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                <div id="kelasDetailPanel" class="hidden"></div>
            `;
            
            try {
                const kelasSnap = await db.ref('kelas').once('value');
                const daftarKelas = Object.keys(kelasSnap.val() || {}).sort();
                const siswaSnap = await db.ref('siswa').once('value');
                const semuaMurid = siswaSnap.val() || {};
                const grid = document.getElementById('kelasListGrid');
                
                if (daftarKelas.length === 0) {
                    grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">Belum ada kelas. Klik "Tambah Kelas".</p>';
                } else {
                    grid.innerHTML = '';
                    for (let kelas of daftarKelas) {
                        const jumlahMurid = Object.values(semuaMurid).filter(m => m.kelas === kelas).length;
                        const card = document.createElement('div');
                        card.className = 'kelas-card bg-white border rounded-xl shadow-sm hover:shadow-md transition-all cursor-pointer overflow-hidden';
                        card.innerHTML = `
                            <div class="p-5 text-center" data-kelas="${kelas}">
                                <div class="text-3xl mb-2 text-blue-600"><i class="fas fa-users"></i></div>
                                <h3 class="font-bold text-lg">Kelas ${escapeHtml(kelas)}</h3>
                                <p class="text-gray-500 text-sm mt-1">${jumlahMurid} murid</p>
                                <div class="mt-3 flex justify-center gap-3">
                                    <button class="editKelasBtn text-blue-500 hover:text-blue-700" data-kelas="${kelas}"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="hapusKelasBtn text-red-500 hover:text-red-700" data-kelas="${kelas}"><i class="fas fa-trash"></i> Hapus</button>
                                </div>
                            </div>
                        `;
                        card.addEventListener('click', (e) => {
                            if (e.target.closest('.editKelasBtn') || e.target.closest('.hapusKelasBtn')) return;
                            openClassDetail(kelas);
                        });
                        grid.appendChild(card);
                    }
                }
                
                document.getElementById('addKelasBtn').onclick = () => {
                    const newKelas = prompt('Masukkan nama kelas baru:');
                    if (newKelas && newKelas.trim()) {
                        db.ref(`kelas/${newKelas.trim()}`).set({ nama: newKelas.trim() })
                            .then(() => loadMuridListView())
                            .catch(err => showError(err.message));
                    }
                };
                
                document.querySelectorAll('.editKelasBtn').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.stopPropagation();
                        const oldKelas = btn.dataset.kelas;
                        const newKelas = prompt('Masukkan nama kelas baru:', oldKelas);
                        if (newKelas && newKelas.trim() && newKelas !== oldKelas) {
                            try {
                                const siswaSnap = await db.ref('siswa').once('value');
                                const siswa = siswaSnap.val() || {};
                                const updates = {};
                                for (let nis in siswa) {
                                    if (siswa[nis].kelas === oldKelas) {
                                        updates[`siswa/${nis}/kelas`] = newKelas;
                                    }
                                }
                                updates[`kelas/${newKelas}`] = { nama: newKelas };
                                updates[`kelas/${oldKelas}`] = null;
                                await db.ref().update(updates);
                                loadMuridListView();
                            } catch (err) { showError(err.message); }
                        }
                    };
                });
                
                document.querySelectorAll('.hapusKelasBtn').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.stopPropagation();
                        const kelas = btn.dataset.kelas;
                        if (confirm(`Hapus kelas ${kelas} dan semua muridnya?`)) {
                            try {
                                const siswaSnap = await db.ref('siswa').once('value');
                                const siswa = siswaSnap.val() || {};
                                const updates = {};
                                for (let nis in siswa) {
                                    if (siswa[nis].kelas === kelas) {
                                        updates[`siswa/${nis}`] = null;
                                    }
                                }
                                updates[`kelas/${kelas}`] = null;
                                await db.ref().update(updates);
                                loadMuridListView();
                            } catch (err) { showError(err.message); }
                        }
                    };
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
            }
        }
        
        async function openClassDetail(kelas) {
            const gridDiv = document.getElementById('kelasListGrid');
            const detailDiv = document.getElementById('kelasDetailPanel');
            if (gridDiv) gridDiv.classList.add('hidden');
            if (detailDiv) {
                detailDiv.classList.remove('hidden');
                detailDiv.innerHTML = '<div class="text-center py-8"><div class="loading-spinner mx-auto mb-2"></div><p>Menghitung statistik kehadiran & nilai, harap tunggu...</p></div>';
            }
            const statsMap = await hitungSemuaStatistikSiswa();
            await renderClassDetail(kelas, statsMap);
        }
        
        async function renderClassDetail(kelas, statsMap) {
            const detailDiv = document.getElementById('kelasDetailPanel');
            if (!detailDiv) return;
            try {
                const siswaSnap = await db.ref('siswa').once('value');
                const semuaMurid = siswaSnap.val() || {};
                let muridKelas = Object.entries(semuaMurid)
                    .filter(([_, m]) => m.kelas === kelas)
                    .map(([nis, m]) => ({ 
                        nis, 
                        nama: m.nama, 
                        password: m.password,
                        kehadiranGlobal: statsMap[nis]?.kehadiranPersen ?? 0,
                        nilaiGlobal: statsMap[nis]?.nilaiRata ?? 0
                    }));
                
                detailDiv.innerHTML = `
                    <div class="bg-white rounded-lg border p-4">
                        <div class="flex flex-wrap justify-between items-center mb-4 gap-3">
                            <div><h2 class="text-xl font-bold">Kelas ${escapeHtml(kelas)}</h2><p class="text-gray-500 text-sm">${muridKelas.length} murid</p></div>
                            <div class="flex gap-2 flex-wrap">
                                <button id="backToListBtn" class="bg-gray-500 text-white px-3 py-1 rounded text-sm"><i class="fas fa-arrow-left"></i> Kembali</button>
                                <button id="editKelasDetailBtn" class="bg-blue-500 text-white px-3 py-1 rounded text-sm"><i class="fas fa-edit"></i> Edit Kelas</button>
                                <button id="hapusKelasDetailBtn" class="bg-red-500 text-white px-3 py-1 rounded text-sm"><i class="fas fa-trash"></i> Hapus Kelas</button>
                            </div>
                        </div>
                        <div class="mb-3 flex flex-wrap gap-2">
                            <button id="tambahMuridDetailBtn" class="bg-blue-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-user-plus"></i> Tambah Murid</button>
                            <button id="importMuridDetailBtn" class="bg-gray-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-paste"></i> Import Data Murid</button>
                            <button id="nilaiMuridDetailBtn" class="bg-purple-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-chart-line"></i> Daftar Nilai Murid</button>
                        </div>
                        <div class="table-wrapper overflow-x-auto">
                            <table class="min-w-full border text-sm">
                                <thead class="bg-gray-100"><tr><th class="p-2">NIS</th><th>Nama</th><th>Password</th><th>Kehadiran (%)</th><th>Rata Nilai</th><th>Aksi</th></tr></thead>
                                <tbody id="detailMuridTbody">${muridKelas.map(m => `
                                    <tr><td class="p-2">${escapeHtml(m.nis)}</td>
                                    <td class="p-2">${escapeHtml(m.nama)}</td>
                                    <td class="p-2">${escapeHtml(m.password)}</td>
                                    <td class="p-2 font-bold ${m.kehadiranGlobal < 50 ? 'text-red-600' : 'text-green-600'}">${m.kehadiranGlobal}%</td>
                                    <td class="p-2 font-bold">${m.nilaiGlobal}</td>
                                    <td class="p-2"><button class="editMuridDetailBtn text-blue-500" data-nis="${m.nis}"><i class="fas fa-edit"></i></button>
                                    <button class="hapusMuridDetailBtn text-red-500 ml-2" data-nis="${m.nis}"><i class="fas fa-trash"></i></button></td>
                                </td>`).join('')}</tbody>
                            </table>
                        </div>
                    </div>
                `;
                
                document.getElementById('backToListBtn').onclick = () => loadMuridListView();
                document.getElementById('editKelasDetailBtn').onclick = async () => {
                    const newKelas = prompt('Masukkan nama kelas baru:', kelas);
                    if (newKelas && newKelas.trim() && newKelas !== kelas) {
                        try {
                            const siswaSnap = await db.ref('siswa').once('value');
                            const siswa = siswaSnap.val() || {};
                            const updates = {};
                            for (let nis in siswa) if (siswa[nis].kelas === kelas) updates[`siswa/${nis}/kelas`] = newKelas;
                            updates[`kelas/${newKelas}`] = { nama: newKelas };
                            updates[`kelas/${kelas}`] = null;
                            await db.ref().update(updates);
                            openClassDetail(newKelas);
                        } catch (err) { showError(err.message); }
                    }
                };
                document.getElementById('hapusKelasDetailBtn').onclick = async () => {
                    if (confirm(`Hapus kelas ${kelas} dan semua muridnya?`)) {
                        try {
                            const siswaSnap = await db.ref('siswa').once('value');
                            const siswa = siswaSnap.val() || {};
                            const updates = {};
                            for (let nis in siswa) if (siswa[nis].kelas === kelas) updates[`siswa/${nis}`] = null;
                            updates[`kelas/${kelas}`] = null;
                            await db.ref().update(updates);
                            loadMuridListView();
                        } catch (err) { showError(err.message); }
                    }
                };
                document.getElementById('tambahMuridDetailBtn').onclick = () => {
                    const nis = prompt('NIS:'), nama = prompt('Nama:'), pass = prompt('Password:');
                    if (nis && nama && pass) db.ref(`siswa/${nis}`).set({ nama, password: pass, kelas, kehadiranGlobal: 0, nilaiGlobal: 0 }).then(()=>openClassDetail(kelas)).catch(showError);
                };
                document.getElementById('importMuridDetailBtn').onclick = async () => {
                    const rawData = prompt(`Impor banyak murid ke kelas ${kelas}\n\nFormat: NIS, NAMA, PASSWORD\nPemisah: koma, tab, atau spasi.\nContoh:\n2526001,Ahmad,1234\n2526002,Budi,5678`);
                    if (!rawData) return;
                    const lines = rawData.split(/\r?\n/);
                    let success=0, error=0, promises=[];
                    for(let line of lines){
                        line=line.trim(); if(!line) continue;
                        let parts; if(line.includes('\t')) parts=line.split('\t'); else if(line.includes(',')) parts=line.split(','); else parts=line.split(/\s+/);
                        parts=parts.map(p=>p.trim());
                        if(parts.length<3){ error++; continue; }
                        const [nis, nama, pass] = parts;
                        if(!nis||!nama||!pass){ error++; continue; }
                        promises.push(db.ref(`siswa/${nis}`).set({ nama, password: pass, kelas, kehadiranGlobal:0, nilaiGlobal:0 }).catch(()=>error++));
                        success++;
                    }
                    await Promise.all(promises);
                    alert(`✅ Selesai! Berhasil: ${success}, Gagal: ${error}`);
                    openClassDetail(kelas);
                };
                
                // ** FITUR BARU: Daftar Nilai Murid **
                document.getElementById('nilaiMuridDetailBtn').onclick = () => {
                    showNilaiMuridModal(kelas);
                };
                
                document.querySelectorAll('.editMuridDetailBtn').forEach(btn=>{
                    btn.onclick = async () => {
                        const nis=btn.dataset.nis;
                        const snap=await db.ref(`siswa/${nis}`).once('value');
                        const data=snap.val();
                        const newNama=prompt('Nama baru:', data.nama);
                        const newPass=prompt('Password baru:', data.password);
                        if(newNama) await db.ref(`siswa/${nis}/nama`).set(newNama);
                        if(newPass) await db.ref(`siswa/${nis}/password`).set(newPass);
                        openClassDetail(kelas);
                    };
                });
                document.querySelectorAll('.hapusMuridDetailBtn').forEach(btn=>{
                    btn.onclick = async () => { if(confirm('Hapus murid ini?')){ await db.ref(`siswa/${btn.dataset.nis}`).remove(); openClassDetail(kelas); } };
                });
            } catch(err){ detailDiv.innerHTML=`<div class="text-red-500 p-4">Error: ${err.message}</div>`; }
        }
        
        // ========= MODAL NILAI MURID (Daftar Nilai Per Mapel) =========
        async function showNilaiMuridModal(kelas) {
            // loading overlay
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal-container p-5 max-w-5xl"><div class="text-center py-8"><div class="loading-spinner mx-auto mb-2"></div><p>Memuat data nilai murid...</p></div></div>`;
            document.body.appendChild(overlay);
            
            try {
                // fetch all needed data
                const [siswaSnap, penugasanSnap, mapelSnap, penilaianSnap] = await Promise.all([
                    db.ref('siswa').once('value'),
                    db.ref('penugasan').once('value'),
                    db.ref('mapel').once('value'),
                    db.ref('penilaian').once('value')
                ]);
                
                const semuaMurid = siswaSnap.val() || {};
                const penugasan = penugasanSnap.val() || {};
                const mapel = mapelSnap.val() || {};
                const penilaian = penilaianSnap.val() || {};
                
                // filter siswa berdasarkan kelas
                const siswaKelas = Object.entries(semuaMurid)
                    .filter(([_, data]) => data.kelas === kelas)
                    .map(([nis, data]) => ({ nis, nama: data.nama }));
                
                if (siswaKelas.length === 0) {
                    overlay.innerHTML = `<div class="modal-container p-5"><div class="text-center"><i class="fas fa-exclamation-triangle text-yellow-500 text-3xl mb-2"></i><p>Tidak ada murid di kelas ${escapeHtml(kelas)}</p><button class="mt-4 bg-blue-500 text-white px-4 py-2 rounded closeModalBtn">Tutup</button></div></div>`;
                    attachCloseModal(overlay);
                    return;
                }
                
                // mapping mapelId -> kode & nama (prioritas kode untuk header)
                const mapelInfo = {};
                for (let [id, m] of Object.entries(mapel)) {
                    mapelInfo[id] = { kode: m.kode || m.nama.substring(0,5).toUpperCase(), nama: m.nama, jenis: m.jenis };
                }
                
                // untuk setiap penugasan, ketahui mapelId, siswaList, lalu kumpulkan nilai dari penilaian
                // struktur: per siswa per mapelId kumpulkan semua skor dari assessment
                const studentScoresByMapel = {}; // { nis: { mapelId: [scores] } }
                siswaKelas.forEach(s => { studentScoresByMapel[s.nis] = {}; });
                
                // iterasi penugasan
                for (let [penId, pg] of Object.entries(penugasan)) {
                    const mapelId = pg.mapelId;
                    if (!mapelId || !mapelInfo[mapelId]) continue;
                    const siswaList = pg.siswaList || [];
                    // ambil data penilaian untuk penugasan ini
                    const assessments = penilaian[penId] || {};
                    // untuk setiap assessment di penugasan ini
                    for (let [assId, assData] of Object.entries(assessments)) {
                        const scores = assData.scores || {};
                        // untuk setiap siswa dalam kelas yang juga ada di siswaList & punya nilai
                        for (let student of siswaKelas) {
                            const nis = student.nis;
                            if (!siswaList.includes(nis)) continue;
                            const nilai = scores[nis];
                            if (typeof nilai === 'number' && !isNaN(nilai)) {
                                if (!studentScoresByMapel[nis][mapelId]) studentScoresByMapel[nis][mapelId] = [];
                                studentScoresByMapel[nis][mapelId].push(nilai);
                            }
                        }
                    }
                }
                
                // hitung rata2 per mapel per siswa, dan kumpulkan daftar mapel yang memiliki minimal 1 nilai di kelas ini
                const subjectCodesSet = new Set();
                const studentSubjectAvg = {}; // { nis: { mapelId: avg } }
                for (let s of siswaKelas) {
                    const nis = s.nis;
                    studentSubjectAvg[nis] = {};
                    const scoresMap = studentScoresByMapel[nis] || {};
                    for (let [mapelId, nilaiArr] of Object.entries(scoresMap)) {
                        if (nilaiArr.length > 0) {
                            const avg = nilaiArr.reduce((a,b)=>a+b,0) / nilaiArr.length;
                            const rounded = Math.round(avg * 10) / 10;
                            studentSubjectAvg[nis][mapelId] = rounded;
                            subjectCodesSet.add(mapelId);
                        }
                    }
                }
                
                // urutkan mapelId berdasarkan kode mapel
                let mapelIdsWithData = Array.from(subjectCodesSet);
                mapelIdsWithData.sort((a,b) => {
                    const kodeA = mapelInfo[a]?.kode || '';
                    const kodeB = mapelInfo[b]?.kode || '';
                    return kodeA.localeCompare(kodeB);
                });
                
                // jika tidak ada satupun nilai, tetap tampilkan tabel tanpa kolom mapel
                const hasAnySubject = mapelIdsWithData.length > 0;
                
                // bangun modal tabel
                let tableHtml = `
                    <div class="modal-header px-4 py-3 flex justify-between items-center">
                        <h3 class="text-lg font-bold"><i class="fas fa-chart-simple text-purple-600"></i> Daftar Nilai Murid - Kelas ${escapeHtml(kelas)}</h3>
                        <button class="closeModalBtn text-gray-500 hover:text-gray-800 text-2xl leading-5">&times;</button>
                    </div>
                    <div class="p-4 overflow-x-auto">
                        <table class="min-w-full border text-sm">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="p-2 border">NIS</th>
                                    <th class="p-2 border">Nama</th>
                                    ${hasAnySubject ? mapelIdsWithData.map(mid => `<th class="p-2 border">${escapeHtml(mapelInfo[mid]?.kode || '?')}</th>`).join('') : ''}
                                    <th class="p-2 border bg-gray-200">Rata2</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                for (let student of siswaKelas) {
                    const nis = student.nis;
                    const nama = student.nama;
                    const subjectAvgs = {};
                    let totalMapelScore = 0;
                    let countMapelWithScore = 0;
                    
                    if (hasAnySubject) {
                        for (let mid of mapelIdsWithData) {
                            const avg = studentSubjectAvg[nis]?.[mid];
                            const displayVal = (avg !== undefined && !isNaN(avg)) ? avg : '-';
                            subjectAvgs[mid] = displayVal;
                            if (typeof avg === 'number' && !isNaN(avg)) {
                                totalMapelScore += avg;
                                countMapelWithScore++;
                            }
                        }
                    }
                    
                    // rata2 overall = total skor mapel / jumlah mapel yang memiliki nilai (jika ada)
                    let overallAvg = 0;
                    if (hasAnySubject && countMapelWithScore > 0) {
                        overallAvg = Math.round((totalMapelScore / countMapelWithScore) * 10) / 10;
                    } else if (!hasAnySubject) {
                        overallAvg = 0;
                    }
                    const overallDisplay = overallAvg === 0 && !hasAnySubject ? '-' : overallAvg;
                    
                    tableHtml += `<tr>
                        <td class="p-2 border">${escapeHtml(nis)}</td>
                        <td class="p-2 border">${escapeHtml(nama)}</td>
                        ${hasAnySubject ? mapelIdsWithData.map(mid => `<td class="p-2 border text-center">${subjectAvgs[mid] === '-' ? '-' : subjectAvgs[mid]}</td>`).join('') : ''}
                        <td class="p-2 border text-center font-bold bg-gray-50">${overallDisplay}</td>
                    </tr>`;
                }
                
                tableHtml += `</tbody></table>`;
                if (!hasAnySubject) {
                    tableHtml += `<div class="mt-4 text-center text-gray-500"><i class="fas fa-info-circle"></i> Belum ada nilai untuk mata pelajaran apapun di kelas ini. Nilai akan muncul setelah guru melakukan penilaian minimal 1 kali.</div>`;
                }
                tableHtml += `</div><div class="p-3 border-t text-right"><button class="closeModalBtn bg-purple-600 text-white px-4 py-2 rounded">Tutup</button></div>`;
                
                overlay.innerHTML = `<div class="modal-container max-w-6xl w-full">${tableHtml}</div>`;
                attachCloseModal(overlay);
                
            } catch (err) {
                overlay.innerHTML = `<div class="modal-container p-5"><div class="text-red-500"><i class="fas fa-exclamation-circle"></i> Gagal memuat nilai: ${err.message}</div><button class="mt-4 closeModalBtn bg-blue-500 text-white px-4 py-2 rounded">Tutup</button></div>`;
                attachCloseModal(overlay);
            }
            
            function attachCloseModal(modalEl) {
                const closeBtns = modalEl.querySelectorAll('.closeModalBtn');
                closeBtns.forEach(btn => {
                    btn.onclick = () => modalEl.remove();
                });
                modalEl.addEventListener('click', (e) => {
                    if (e.target === modalEl) modalEl.remove();
                });
            }
        }
        
        // ===================== DATA GURU =====================
        async function loadGuru() {
            const container = document.getElementById('guru');
            try {
                const snapGuru = await db.ref('guru').once('value');
                const guru = snapGuru.val() || {};
                const penugasanSnap = await db.ref('penugasan').once('value');
                const penugasan = penugasanSnap.val() || {};
                const attendanceSnap = await db.ref('attendance').once('value');
                const attendanceAll = attendanceSnap.val() || {};
                
                const now = new Date();
                const startDefault = new Date(now.getFullYear(), now.getMonth(), 1);
                const endDefault = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                
                let html = `
                    <div class="mb-4 flex flex-wrap gap-3 items-end">
                        <div>
                            <label class="block text-sm font-semibold">Tanggal Awal</label>
                            <input type="date" id="startDate" class="border p-1 rounded" value="${startDefault.toISOString().slice(0,10)}">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold">Tanggal Akhir</label>
                            <input type="date" id="endDate" class="border p-1 rounded" value="${endDefault.toISOString().slice(0,10)}">
                        </div>
                        <button id="applyRangeBtn" class="bg-blue-600 text-white px-3 py-1 rounded"><i class="fas fa-sync-alt"></i> Terapkan</button>
                        <button id="tambahGuruBtn" class="bg-green-500 text-white px-3 py-1 rounded"><i class="fas fa-plus"></i> Tambah Guru</button>
                        <button id="copypasteGuruBtn" class="bg-gray-500 text-white px-3 py-1 rounded"><i class="fas fa-paste"></i>Import Data Guru</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border">
                            <thead class="bg-gray-100"><tr><th class="p-2">Nama</th><th>Password</th><th>Total Kehadiran (Range)</th><th>Aksi</th></tr></thead>
                            <tbody id="guruTbody"></tbody>
                        </table>
                    </div>
                `;
                container.innerHTML = html;
                
                async function hitungKehadiranGuru(guruName, startTimestamp, endTimestamp) {
                    let totalHadir = 0;
                    for (let [idPenugasan, pg] of Object.entries(penugasan)) {
                        if (pg.guruName === guruName) {
                            const sessions = attendanceAll[idPenugasan] || {};
                            for (let ses of Object.values(sessions)) {
                                const sesTimestamp = parseDMY(ses.date);
                                if (sesTimestamp && sesTimestamp >= startTimestamp && sesTimestamp <= endTimestamp) {
                                    totalHadir++;
                                }
                            }
                        }
                    }
                    return totalHadir;
                }
                
                async function renderGuruTable(startDateStr, endDateStr) {
                    const startDate = new Date(startDateStr);
                    const endDate = new Date(endDateStr);
                    endDate.setHours(23,59,59,999);
                    const startTimestamp = startDate.getTime();
                    const endTimestamp = endDate.getTime();
                    
                    const tbody = document.getElementById('guruTbody');
                    if (!tbody) return;
                    tbody.innerHTML = '';
                    for (let [nama, val] of Object.entries(guru)) {
                        const jumlahKehadiran = await hitungKehadiranGuru(nama, startTimestamp, endTimestamp);
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="p-2 border">${escapeHtml(nama)}</td>
                            <td class="p-2 border">${escapeHtml(val.password)}</td>
                            <td class="p-2 border text-center font-bold">${jumlahKehadiran}</td>
                            <td class="p-2 border"><button class="editGuruBtn text-blue-500" data-nama="${escapeHtml(nama)}"><i class="fas fa-edit"></i></button> <button class="hapusGuruBtn text-red-500 ml-2" data-nama="${escapeHtml(nama)}"><i class="fas fa-trash"></i></button></td>
                        `;
                        tbody.appendChild(row);
                    }
                    document.querySelectorAll('.editGuruBtn').forEach(btn => {
                        btn.onclick = async () => {
                            let newPass = prompt('Password baru:');
                            if (newPass) await db.ref(`guru/${btn.dataset.nama}/password`).set(newPass);
                            loadGuru();
                        };
                    });
                    document.querySelectorAll('.hapusGuruBtn').forEach(btn => {
                        btn.onclick = async () => {
                            if (confirm('Hapus guru?')) await db.ref(`guru/${btn.dataset.nama}`).remove();
                            loadGuru();
                        };
                    });
                }
                
                document.getElementById('applyRangeBtn').onclick = () => {
                    const start = document.getElementById('startDate').value;
                    const end = document.getElementById('endDate').value;
                    if (start && end) renderGuruTable(start, end);
                    else alert("Pilih rentang tanggal");
                };
                document.getElementById('tambahGuruBtn').onclick = () => { let n=prompt('Nama Guru:'), p=prompt('Password:'); if(n&&p) db.ref(`guru/${n}`).set({password:p}).then(()=>loadGuru()).catch(showError); };
                document.getElementById('copypasteGuruBtn').onclick = () => { let raw=prompt('Tempel data guru (format: Nama,Password per baris):'); if(raw){ let lines=raw.split('\n'),promises=[]; lines.forEach(l=>{ let [nama,pass]=l.split(','); if(nama&&pass) promises.push(db.ref(`guru/${nama.trim()}`).set({password:pass.trim()})); }); Promise.all(promises).then(()=>loadGuru()).catch(showError); } };
                
                const startDefaultVal = document.getElementById('startDate').value;
                const endDefaultVal = document.getElementById('endDate').value;
                await renderGuruTable(startDefaultVal, endDefaultVal);
                
            } catch(err) { container.innerHTML=`<p class="text-red-500">Error: ${err.message}</p>`; }
        }
        
        // ===================== DATA MAPEL =====================
        async function loadMapel() {
            const container = document.getElementById('mapel');
            try {
                const snap = await db.ref('mapel').once('value');
                const mapel = snap.val() || {};
                let html = `<div class="mb-4 flex flex-wrap gap-2"><button id="tambahMapelBtn" class="bg-green-500 text-white px-3 py-1 rounded"><i class="fas fa-plus"></i> Tambah Mapel</button><button id="importMapelBtn" class="bg-blue-600 text-white px-3 py-1 rounded"><i class="fas fa-file-import"></i> Import Data Mapel</button></div>
                <div class="overflow-x-auto"><table class="min-w-full border"><thead class="bg-gray-100"><tr><th class="p-2">Mata Pelajaran</th><th class="p-2">Kode Mapel</th><th class="p-2">Jenis</th><th class="p-2">Aksi</th></tr></thead><tbody>`;
                for (let [id, val] of Object.entries(mapel)) {
                    html += `<tr><td class="p-2 border">${escapeHtml(val.nama)}</td><td class="p-2 border">${escapeHtml(val.kode || '')}</td><td class="p-2 border">${escapeHtml(val.jenis)}</td><td class="p-2 border"><button class="editMapelBtn text-blue-500" data-id="${id}"><i class="fas fa-edit"></i></button> <button class="hapusMapelBtn text-red-500 ml-2" data-id="${id}"><i class="fas fa-trash"></i></button></td></tr>`;
                }
                html += `</tbody></table></div>`;
                container.innerHTML = html;
                
                document.getElementById('tambahMapelBtn').onclick = () => {
                    const nama = prompt('Nama Mata Pelajaran:');
                    if (!nama) return;
                    const kode = prompt('Kode Mata Pelajaran (contoh: MTK, B.ING):');
                    if (kode === null) return;
                    const jenis = prompt('Jenis (inkul / eskul / pesantren):');
                    if (jenis && ['inkul','eskul','pesantren'].includes(jenis.toLowerCase())) {
                        db.ref(`mapel/${Date.now()}`).set({ nama: nama.trim(), kode: kode.trim(), jenis: jenis.toLowerCase() }).then(()=>loadMapel()).catch(showError);
                    } else alert('Jenis harus inkul, eskul, atau pesantren');
                };
                document.getElementById('importMapelBtn').onclick = async () => {
                    const rawData = prompt(`Import Mata Pelajaran\n\nFormat per baris: NAMA MAPEL, KODE MAPEL, JENIS\nJenis: inkul, eskul, pesantren\nContoh:\nMatematika,MTK,inkul`);
                    if (!rawData) return;
                    const lines = rawData.split(/\r?\n/);
                    let success=0, error=0, promises=[];
                    for(let line of lines){
                        line=line.trim(); if(!line) continue;
                        let parts; if(line.includes('\t')) parts=line.split('\t'); else if(line.includes(',')) parts=line.split(',');
                        else { error++; continue; }
                        parts=parts.map(p=>p.trim());
                        if(parts.length<3){ error++; continue; }
                        const [nama, kode, jenis] = parts;
                        if(!nama||!kode||!['inkul','eskul','pesantren'].includes(jenis.toLowerCase())){ error++; continue; }
                        promises.push(db.ref(`mapel/${Date.now()+success}`).set({ nama, kode, jenis: jenis.toLowerCase() }).catch(()=>error++));
                        success++;
                    }
                    await Promise.all(promises);
                    alert(`Berhasil: ${success}, Gagal: ${error}`);
                    loadMapel();
                };
                document.querySelectorAll('.editMapelBtn').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.dataset.id;
                        const snap = await db.ref(`mapel/${id}`).once('value');
                        const data = snap.val();
                        const newNama = prompt('Nama baru:', data.nama);
                        if(newNama===null) return;
                        const newKode = prompt('Kode baru:', data.kode||'');
                        const newJenis = prompt('Jenis baru (inkul/eskul/pesantren):', data.jenis);
                        if(newJenis && ['inkul','eskul','pesantren'].includes(newJenis.toLowerCase())){
                            await db.ref(`mapel/${id}`).update({ nama: newNama.trim(), kode: newKode.trim(), jenis: newJenis.toLowerCase() });
                            loadMapel();
                        } else if(newJenis) alert('Jenis tidak valid');
                    };
                });
                document.querySelectorAll('.hapusMapelBtn').forEach(btn => {
                    btn.onclick = async () => { if(confirm('Hapus mapel?')){ await db.ref(`mapel/${btn.dataset.id}`).remove(); loadMapel(); } };
                });
            } catch(err){ container.innerHTML=`<p class="text-red-500">Error: ${err.message}</p>`; }
        }
        
        // ===================== PENUGASAN =====================
        async function loadPenugasan() { /* (tidak diubah) */
            const container = document.getElementById('penugasan');
            try {
                const [mapelSnap, guruSnap, siswaSnap, kelasSnap, penugasanSnap] = await Promise.all([
                    db.ref('mapel').once('value'), db.ref('guru').once('value'), db.ref('siswa').once('value'),
                    db.ref('kelas').once('value'), db.ref('penugasan').once('value')
                ]);
                const mapel = mapelSnap.val() || {};
                const guru = guruSnap.val() || {};
                const semuaMurid = siswaSnap.val() || {};
                const daftarKelas = Object.keys(kelasSnap.val() || {});
                const penugasan = penugasanSnap.val() || {};
                
                let formHtml = `<div class="border p-4 rounded mb-6 bg-gray-50"><h3 class="font-bold mb-2"><i class="fas fa-tasks"></i> Tambah Penugasan Baru</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3"><div><label>Mata Pelajaran</label><select id="pilihMapel" class="border p-1 rounded w-full"><option value="">-- Pilih --</option>${Object.entries(mapel).map(([id,m])=>`<option value="${id}" data-jenis="${m.jenis}">${escapeHtml(m.nama)} (${m.kode || '-'}) - ${m.jenis}</option>`).join('')}</select></div><div><label>Guru</label><select id="pilihGuru" class="border p-1 rounded w-full"><option value="">-- Pilih --</option>${Object.keys(guru).map(g=>`<option value="${g}">${escapeHtml(g)}</option>`).join('')}</select></div><div id="targetContainer"><label id="targetLabel">Target</label><div id="targetInput"></div></div></div><button id="simpanPenugasanBtn" class="bg-blue-600 text-white px-4 py-1 rounded">Simpan</button></div>`;
                let listHtml = `<h3 class="font-bold mt-4">Daftar Penugasan</h3><div class="overflow-x-auto"><table class="min-w-full border mt-2"><thead class="bg-gray-100"><tr><th>Mapel</th><th>Guru</th><th>Kelas / Murid Terlibat</th><th>Aksi</th></tr></thead><tbody>`;
                for (let [id, pg] of Object.entries(penugasan)) {
                    const mapelData = mapel[pg.mapelId];
                    const namaMapel = mapelData?.nama || '❌';
                    const jenisMapel = mapelData?.jenis || 'inkul';
                    let infoTerlibat = '';
                    const jumlahMurid = pg.siswaList?.length || 0;
                    if (jenisMapel === 'inkul') {
                        const kelasSet = new Set();
                        for (let nis of (pg.siswaList || [])) if (semuaMurid[nis]) kelasSet.add(semuaMurid[nis].kelas);
                        infoTerlibat = Array.from(kelasSet).map(k=>`Kelas ${k}`).join(', ') || '(Tidak ada kelas)';
                    } else infoTerlibat = `${jumlahMurid} murid`;
                    listHtml += `<tr><td class="p-2">${escapeHtml(namaMapel)}</td><td class="p-2">${escapeHtml(pg.guruName)}</td><td class="p-2">${escapeHtml(infoTerlibat)}</td><td class="p-2"><button class="hapusPenugasanBtn text-red-500" data-id="${id}"><i class="fas fa-trash"></i> Hapus</button></td></tr>`;
                }
                listHtml += `</tbody></table></div>`;
                container.innerHTML = formHtml + listHtml;
                const mapelSelect = document.getElementById('pilihMapel');
                const targetDiv = document.getElementById('targetInput');
                const targetLabel = document.getElementById('targetLabel');
                const updateTarget = () => {
                    const opt = mapelSelect.options[mapelSelect.selectedIndex];
                    const jenis = opt?.dataset?.jenis;
                    targetDiv.innerHTML = '';
                    if (jenis === 'inkul') {
                        targetLabel.innerText = 'Pilih Kelas (bisa lebih)';
                        const sel = document.createElement('select'); sel.multiple=true; sel.className='border p-1 rounded w-full'; sel.size=4;
                        sel.innerHTML = daftarKelas.map(k=>`<option value="${k}">${escapeHtml(k)}</option>`).join('');
                        targetDiv.appendChild(sel);
                    } else if (jenis === 'eskul' || jenis === 'pesantren') {
                        targetLabel.innerText = 'Pilih Murid (bisa lebih)';
                        const sel = document.createElement('select'); sel.multiple=true; sel.className='border p-1 rounded w-full'; sel.size=6;
                        sel.innerHTML = Object.entries(semuaMurid).map(([nis,m])=>`<option value="${nis}">${escapeHtml(nis)} - ${escapeHtml(m.nama)} (${m.kelas})</option>`).join('');
                        targetDiv.appendChild(sel);
                    } else { targetLabel.innerText='Target'; targetDiv.innerHTML='<p class="text-gray-500 text-sm">Pilih mapel dulu</p>'; }
                };
                mapelSelect.onchange = updateTarget;
                document.getElementById('simpanPenugasanBtn').onclick = async () => {
                    const mapelId = mapelSelect.value, guruName = document.getElementById('pilihGuru').value;
                    if(!mapelId || !guruName) { alert('Lengkapi data'); return; }
                    const jenis = mapelSelect.options[mapelSelect.selectedIndex].dataset.jenis;
                    let muridList = [];
                    if(jenis === 'inkul'){
                        const sel = document.querySelector('#targetInput select');
                        const kelasTerpilih = Array.from(sel.selectedOptions).map(o=>o.value);
                        if(!kelasTerpilih.length) { alert('Pilih kelas'); return; }
                        for(let k of kelasTerpilih) muridList.push(...Object.entries(semuaMurid).filter(([_,m])=>m.kelas===k).map(([nis])=>nis));
                        muridList = [...new Set(muridList)];
                    } else {
                        const sel = document.querySelector('#targetInput select');
                        muridList = Array.from(sel.selectedOptions).map(o=>o.value);
                        if(!muridList.length) { alert('Pilih murid'); return; }
                    }
                    if(!muridList.length) { alert('Tidak ada murid'); return; }
                    await db.ref('penugasan').push({ mapelId, guruName, siswaList: muridList });
                    alert('Penugasan tersimpan');
                    loadPenugasan();
                };
                document.querySelectorAll('.hapusPenugasanBtn').forEach(btn=>{
                    btn.onclick = async () => { if(confirm('Hapus penugasan?')){ await db.ref(`penugasan/${btn.dataset.id}`).remove(); loadPenugasan(); } };
                });
            } catch(err) { container.innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`; }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
        }
        
        // Initial load
        loadMuridListView();
        loadGuru();
        loadMapel();
        loadPenugasan();
    </script>
</body>
</html>
