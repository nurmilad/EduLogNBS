<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - EduLogNBS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .tab-content { transition: all 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .table-wrapper { overflow-x: auto; border-radius: 0.75rem; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Panel Admin EduLogNBS</h1>
                <a href="index.html" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
            
            <!-- Tab Navigation -->
            <div class="border-b mb-6">
                <ul class="flex flex-wrap -mb-px">
                    <li class="mr-2"><button class="tab-link inline-block p-3 text-blue-600 border-b-2 border-blue-600 rounded-t-lg active" data-tab="murid">Data Murid</button></li>
                    <li class="mr-2"><button class="tab-link inline-block p-3 hover:text-gray-600" data-tab="guru">Data Guru</button></li>
                    <li class="mr-2"><button class="tab-link inline-block p-3 hover:text-gray-600" data-tab="mapel">Data Mapel</button></li>
                    <li class="mr-2"><button class="tab-link inline-block p-3 hover:text-gray-600" data-tab="penugasan">Penugasan</button></li>
                </ul>
            </div>

            <!-- Tab Content -->
            <div id="murid" class="tab-content">Loading Data Murid...</div>
            <div id="guru" class="tab-content hidden">Loading Data Guru...</div>
            <div id="mapel" class="tab-content hidden">Loading Data Mapel...</div>
            <div id="penugasan" class="tab-content hidden">Loading Penugasan...</div>
        </div>
    </div>

    <script>
        // Konfigurasi Firebase (tetap)
        const firebaseConfig = {
            apiKey: "AIzaSyAEUxtP2D26eF5zS2sgR5_bpzK6SNRwQA0",
            authDomain: "edulognbs.firebaseapp.com",
            databaseURL: "https://edulognbs-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "edulognbs",
            storageBucket: "edulognbs.firebasestorage.app",
            messagingSenderId: "759345868898",
            appId: "1:759345868898:web:40487df20ab4f43045213b",
            measurementId: "G-SV83KDGZTS"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        
        function showError(msg) {
            console.error(msg);
            alert("Error: " + msg);
        }
        
        // Tab switching
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-link').forEach(btn => {
                btn.classList.remove('border-blue-600', 'text-blue-600');
                btn.classList.add('border-transparent', 'text-gray-500');
            });
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('border-blue-600', 'text-blue-600');
            if (tabId === 'murid') loadMurid();
            else if (tabId === 'guru') loadGuru();
            else if (tabId === 'mapel') loadMapel();
            else if (tabId === 'penugasan') loadPenugasan();
        }
        
        document.querySelectorAll('.tab-link').forEach(btn => {
            btn.onclick = () => showTab(btn.dataset.tab);
        });
        
        // ===================== DATA MURID =====================
        async function loadMurid() {
            const container = document.getElementById('murid');
            container.innerHTML = `
                <div class="flex justify-between mb-4">
                    <button id="addKelasBtn" class="bg-green-500 text-white px-3 py-1 rounded"><i class="fas fa-plus"></i> Tambah Kelas</button>
                </div>
                <div id="kelasContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            `;
            
            try {
                const kelasSnap = await db.ref('kelas').once('value');
                const daftarKelas = Object.keys(kelasSnap.val() || {}).sort();
                const siswaSnap = await db.ref('siswa').once('value');
                const semuaSiswa = siswaSnap.val() || {};
                const kelasContainer = document.getElementById('kelasContainer');
                if (daftarKelas.length === 0) {
                    kelasContainer.innerHTML = '<p class="text-gray-500 col-span-full">Belum ada kelas. Klik "Tambah Kelas".</p>';
                }
                
                for (let kelas of daftarKelas) {
                    const siswaKelas = Object.entries(semuaSiswa)
                        .filter(([_, s]) => s.kelas === kelas)
                        .map(([nis, s]) => ({ nis, ...s }));
                    
                    const card = document.createElement('div');
                    card.className = 'border rounded-lg p-3 shadow-sm bg-white';
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-2 border-b pb-2">
                            <h3 class="font-bold text-lg">Kelas ${kelas}</h3>
                            <div>
                                <button class="hapusKelasBtn text-red-500 hover:text-red-700 mr-2" data-kelas="${kelas}"><i class="fas fa-trash-alt"></i> Hapus Kelas</button>
                                <button class="editKelasBtn text-blue-500 hover:text-blue-700" data-kelas="${kelas}"><i class="fas fa-edit"></i> Edit</button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="min-w-full text-sm border">
                                <thead class="bg-gray-100">
                                    <tr><th class="p-1">NIS</th><th>Nama</th><th>Password</th><th>Kehadiran</th><th>Rata Nilai</th><th>Aksi</th></tr>
                                </thead>
                                <tbody id="tbody-${kelas.replace(/\s/g, '')}">
                                    ${siswaKelas.map(s => `
                                        <tr>
                                            <td class="p-1">${escapeHtml(s.nis)}</td>
                                            <td class="p-1">${escapeHtml(s.nama)}</td>
                                            <td class="p-1">${escapeHtml(s.password)}</td>
                                            <td class="p-1">${s.kehadiranGlobal || 0}%</td>
                                            <td class="p-1">${s.nilaiGlobal || 0}</td>
                                            <td class="p-1">
                                                <button class="editSiswaBtn text-blue-500" data-nis="${s.nis}" data-kelas="${kelas}"><i class="fas fa-edit"></i></button>
                                                <button class="hapusSiswaBtn text-red-500" data-nis="${s.nis}" data-kelas="${kelas}"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        <div class="mt-3 flex gap-2">
                            <button class="tambahMuridBtn bg-blue-500 text-white px-2 py-1 rounded text-sm" data-kelas="${kelas}"><i class="fas fa-user-plus"></i> Tambah Murid</button>
                            <button class="copypasteBtn bg-gray-500 text-white px-2 py-1 rounded text-sm" data-kelas="${kelas}"><i class="fas fa-paste"></i> Import Multi Siswa</button>
                        </div>
                    `;
                    kelasContainer.appendChild(card);
                }
                attachMuridEvents();
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-red-500">Gagal memuat data murid: ${err.message}</p>`;
            }
        }
        
        function attachMuridEvents() {
            // Tambah Kelas
            const addBtn = document.getElementById('addKelasBtn');
            if (addBtn) addBtn.onclick = () => {
                const newKelas = prompt('Masukkan nama kelas baru:');
                if (newKelas && newKelas.trim()) {
                    db.ref(`kelas/${newKelas.trim()}`).set({ nama: newKelas.trim() })
                        .then(() => loadMurid())
                        .catch(err => showError(err.message));
                }
            };
            
            // Hapus Kelas
            document.querySelectorAll('.hapusKelasBtn').forEach(btn => {
                btn.onclick = async () => {
                    const kelas = btn.dataset.kelas;
                    if (confirm(`Hapus kelas ${kelas} dan semua siswanya?`)) {
                        try {
                            const siswaSnap = await db.ref('siswa').once('value');
                            const siswa = siswaSnap.val() || {};
                            const updates = {};
                            for (let nis in siswa) {
                                if (siswa[nis].kelas === kelas) {
                                    updates[`siswa/${nis}`] = null;
                                }
                            }
                            updates[`kelas/${kelas}`] = null;
                            await db.ref().update(updates);
                            loadMurid();
                        } catch (err) { showError(err.message); }
                    }
                };
            });
            
            // Edit Kelas
            document.querySelectorAll('.editKelasBtn').forEach(btn => {
                btn.onclick = async () => {
                    const oldKelas = btn.dataset.kelas;
                    const newKelas = prompt('Masukkan nama kelas baru:', oldKelas);
                    if (newKelas && newKelas.trim() && newKelas !== oldKelas) {
                        try {
                            const siswaSnap = await db.ref('siswa').once('value');
                            const siswa = siswaSnap.val() || {};
                            const updates = {};
                            for (let nis in siswa) {
                                if (siswa[nis].kelas === oldKelas) {
                                    updates[`siswa/${nis}/kelas`] = newKelas;
                                }
                            }
                            updates[`kelas/${newKelas}`] = { nama: newKelas };
                            updates[`kelas/${oldKelas}`] = null;
                            await db.ref().update(updates);
                            loadMurid();
                        } catch (err) { showError(err.message); }
                    }
                };
            });
            
            // Tambah Murid (satu per satu)
            document.querySelectorAll('.tambahMuridBtn').forEach(btn => {
                btn.onclick = () => {
                    const kelas = btn.dataset.kelas;
                    const nis = prompt('NIS:');
                    const nama = prompt('Nama:');
                    const pass = prompt('Password:');
                    if (nis && nama && pass) {
                        db.ref(`siswa/${nis}`).set({
                            nama, password: pass, kelas,
                            kehadiranGlobal: 0, nilaiGlobal: 0
                        }).then(() => loadMurid())
                          .catch(err => showError(err.message));
                    }
                };
            });
            
            // Hapus Siswa
            document.querySelectorAll('.hapusSiswaBtn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Hapus siswa ini?')) {
                        const nis = btn.dataset.nis;
                        try {
                            await db.ref(`siswa/${nis}`).remove();
                            loadMurid();
                        } catch (err) { showError(err.message); }
                    }
                };
            });
            
            // Edit Siswa
            document.querySelectorAll('.editSiswaBtn').forEach(btn => {
                btn.onclick = async () => {
                    const nis = btn.dataset.nis;
                    try {
                        const snap = await db.ref(`siswa/${nis}`).once('value');
                        const data = snap.val();
                        const newNama = prompt('Nama baru:', data.nama);
                        const newPass = prompt('Password baru:', data.password);
                        if (newNama) await db.ref(`siswa/${nis}/nama`).set(newNama);
                        if (newPass) await db.ref(`siswa/${nis}/password`).set(newPass);
                        loadMurid();
                    } catch (err) { showError(err.message); }
                };
            });
            
            // ========== FITUR IMPORT MULTI SISWA (DIPERBAIKI - TIDAK MEMBUAT DUPLIKAT KELAS) ==========
            document.querySelectorAll('.copypasteBtn').forEach(btn => {
                btn.onclick = async () => {
                    const targetKelasFromBtn = btn.dataset.kelas; // Kelas yang sedang dilihat (opsional referensi)
                    const rawData = prompt(
                        "Impor banyak siswa sekaligus.\n\nFormat per baris: NIS, NAMA, KELAS, PASSWORD\nPemisah bisa: koma, tab, atau spasi.\n\nContoh:\n2526001,AHMAD YUSUF,7A,1234\n2526002,AINUN ANUGRAH,7A,1234\n\nCATATAN PENTING:\n- Nama kelas akan dicocokkan secara fleksibel (abaikan huruf besar/kecil & spasi).\n- Jika kelas sudah ada (misal '7A' dengan penulisan '7a'), siswa akan masuk ke kelas yang sudah ada.\n- Jika belum ada, akan dibuat kelas baru.\n- Data siswa akan ditambahkan ke kelas yang sesuai (tidak membuat kelas duplikat)."
                    );
                    if (!rawData) return;
                    
                    // Ambil data kelas yang sudah ada dari database (untuk pencocokan)
                    let existingKelasMap = new Map(); // key: normalized (lowercase, trim), value: original key
                    try {
                        const kelasSnapshot = await db.ref('kelas').once('value');
                        const kelasData = kelasSnapshot.val() || {};
                        for (const originalKey of Object.keys(kelasData)) {
                            const normalized = originalKey.trim().toLowerCase();
                            existingKelasMap.set(normalized, originalKey);
                        }
                    } catch (err) {
                        showError("Gagal membaca data kelas: " + err.message);
                        return;
                    }
                    
                    const lines = rawData.split(/\r?\n/);
                    let successCount = 0;
                    let errorCount = 0;
                    let kelasBaruSet = new Set();   // kelas baru yang belum ada (akan ditambahkan)
                    const studentPromises = [];
                    const studentsToAdd = [];        // simpan sementara untuk keperluan debug
                    
                    for (let line of lines) {
                        line = line.trim();
                        if (line === "") continue;
                        
                        // Deteksi pemisah: tab, koma, spasi
                        let parts;
                        if (line.includes('\t')) {
                            parts = line.split('\t');
                        } else if (line.includes(',')) {
                            parts = line.split(',');
                        } else {
                            parts = line.split(/\s+/);
                        }
                        
                        parts = parts.map(p => p.trim());
                        if (parts.length < 4) {
                            errorCount++;
                            console.warn(`Baris tidak valid (min 4 kolom): ${line}`);
                            continue;
                        }
                        
                        const nis = parts[0];
                        const nama = parts[1];
                        let kelasInput = parts[2];
                        const password = parts[3];
                        
                        if (!nis || !nama || !kelasInput || !password) {
                            errorCount++;
                            continue;
                        }
                        
                        // Normalisasi kelas input
                        const normalizedInput = kelasInput.trim().toLowerCase();
                        let actualKelas = existingKelasMap.get(normalizedInput);
                        
                        if (!actualKelas) {
                            // Kelas belum ada di database: akan ditambahkan nanti
                            // Tapi gunakan nama asli dari input (trim) sebagai calon kelas baru
                            const newKelasRaw = kelasInput.trim();
                            actualKelas = newKelasRaw;
                            kelasBaruSet.add(newKelasRaw);
                            // Catat ke map sementara agar baris berikutnya dalam satu batch bisa langsung pakai
                            existingKelasMap.set(normalizedInput, newKelasRaw);
                        }
                        
                        // Siapkan data siswa
                        const siswaData = {
                            nama: nama,
                            password: password,
                            kelas: actualKelas,
                            kehadiranGlobal: 0,
                            nilaiGlobal: 0
                        };
                        
                        studentsToAdd.push({ nis, data: siswaData });
                        const promise = db.ref(`siswa/${nis}`).set(siswaData)
                            .catch(err => {
                                console.error(`Gagal simpan siswa ${nis}:`, err);
                                errorCount++;
                            });
                        studentPromises.push(promise);
                        successCount++;
                    }
                    
                    // Jika ada kelas baru yang perlu ditambahkan
                    const kelasPromises = [];
                    for (let newKelas of kelasBaruSet) {
                        // Pastikan belum ada (cek ulang untuk aman)
                        const kelasRef = db.ref(`kelas/${newKelas}`);
                        const snapCheck = await kelasRef.once('value').catch(e => null);
                        if (!snapCheck || !snapCheck.exists()) {
                            kelasPromises.push(kelasRef.set({ nama: newKelas }));
                        }
                    }
                    
                    // Eksekusi semua operasi
                    try {
                        await Promise.all([...studentPromises, ...kelasPromises]);
                        let infoKelasBaru = kelasBaruSet.size ? Array.from(kelasBaruSet).join(', ') : 'tidak ada';
                        alert(`✅ Impor selesai!\nBerhasil: ${successCount} siswa\nGagal: ${errorCount}\nKelas baru yang ditambahkan: ${infoKelasBaru}\n\n(Siswa telah dimasukkan ke kelas yang cocok, tidak ada duplikat kelas)`);
                        loadMurid(); // refresh tampilan
                    } catch (err) {
                        showError("Gagal menyimpan data: " + err.message);
                    }
                };
            });
        }
        
        // ===================== DATA GURU =====================
        async function loadGuru() {
            const container = document.getElementById('guru');
            try {
                const snap = await db.ref('guru').once('value');
                const guru = snap.val() || {};
                let html = `
                    <div class="mb-4">
                        <button id="tambahGuruBtn" class="bg-green-500 text-white px-3 py-1 rounded"><i class="fas fa-plus"></i> Tambah Guru</button>
                        <button id="copypasteGuruBtn" class="bg-gray-500 text-white px-3 py-1 rounded ml-2"><i class="fas fa-paste"></i> Copypaste Excel</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border">
                            <thead class="bg-gray-100"><tr><th class="p-2">Nama</th><th>Password</th><th>Aksi</th></tr></thead>
                            <tbody>
                `;
                for (let [nama, val] of Object.entries(guru)) {
                    html += `
                        <tr>
                            <td class="p-2">${escapeHtml(nama)}</td>
                            <td class="p-2">${escapeHtml(val.password)}</td>
                            <td class="p-2">
                                <button class="editGuruBtn text-blue-500" data-nama="${escapeHtml(nama)}"><i class="fas fa-edit"></i></button>
                                <button class="hapusGuruBtn text-red-500 ml-2" data-nama="${escapeHtml(nama)}"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }
                html += `</tbody>起点</div>`;
                container.innerHTML = html;
                
                document.getElementById('tambahGuruBtn').onclick = () => {
                    const nama = prompt('Nama Guru:');
                    const pass = prompt('Password:');
                    if (nama && pass) {
                        db.ref(`guru/${nama}`).set({ password: pass }).then(() => loadGuru()).catch(err => showError(err.message));
                    }
                };
                document.getElementById('copypasteGuruBtn').onclick = () => {
                    const raw = prompt('Tempel data guru (format: Nama,Password per baris):');
                    if (raw) {
                        const lines = raw.split('\n');
                        const promises = [];
                        lines.forEach(line => {
                            let [nama, pass] = line.split(',');
                            if (nama && pass) {
                                promises.push(db.ref(`guru/${nama.trim()}`).set({ password: pass.trim() }));
                            }
                        });
                        Promise.all(promises).then(() => loadGuru()).catch(err => showError(err.message));
                    }
                };
                document.querySelectorAll('.editGuruBtn').forEach(btn => {
                    btn.onclick = async () => {
                        const nama = btn.dataset.nama;
                        const newPass = prompt('Password baru:', '');
                        if (newPass) {
                            await db.ref(`guru/${nama}/password`).set(newPass);
                            loadGuru();
                        }
                    };
                });
                document.querySelectorAll('.hapusGuruBtn').forEach(btn => {
                    btn.onclick = async () => {
                        if (confirm('Hapus guru ini?')) {
                            await db.ref(`guru/${btn.dataset.nama}`).remove();
                            loadGuru();
                        }
                    };
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
            }
        }
        
        // ===================== DATA MAPEL =====================
        async function loadMapel() {
            const container = document.getElementById('mapel');
            try {
                const snap = await db.ref('mapel').once('value');
                const mapel = snap.val() || {};
                let html = `
                    <div class="mb-4"><button id="tambahMapelBtn" class="bg-green-500 text-white px-3 py-1 rounded"><i class="fas fa-plus"></i> Tambah Mapel</button></div>
                    <div class="overflow-x-auto"><table class="min-w-full border"><thead class="bg-gray-100"><tr><th>Mata Pelajaran</th><th>Jenis</th><th>Aksi</th></tr></thead><tbody>
                `;
                for (let [id, val] of Object.entries(mapel)) {
                    html += `<tr><td class="p-2">${escapeHtml(val.nama)}</td><td class="p-2">${escapeHtml(val.jenis)}</td><td class="p-2"><button class="editMapelBtn text-blue-500" data-id="${id}"><i class="fas fa-edit"></i></button> <button class="hapusMapelBtn text-red-500 ml-2" data-id="${id}"><i class="fas fa-trash"></i></button></td></tr>`;
                }
                html += `</tbody></table></div>`;
                container.innerHTML = html;
                
                document.getElementById('tambahMapelBtn').onclick = () => {
                    const nama = prompt('Nama Mata Pelajaran:');
                    const jenis = prompt('Jenis (inkul / eskul / pesantren):');
                    if (nama && jenis && ['inkul', 'eskul', 'pesantren'].includes(jenis.toLowerCase())) {
                        db.ref(`mapel/${Date.now()}`).set({ nama, jenis: jenis.toLowerCase() }).then(() => loadMapel()).catch(err => showError(err.message));
                    } else alert('Jenis harus inkul, eskul, atau pesantren');
                };
                document.querySelectorAll('.editMapelBtn').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.dataset.id;
                        const snap = await db.ref(`mapel/${id}`).once('value');
                        const data = snap.val();
                        const newNama = prompt('Nama baru:', data.nama);
                        const newJenis = prompt('Jenis baru (inkul/eskul/pesantren):', data.jenis);
                        if (newNama) await db.ref(`mapel/${id}/nama`).set(newNama);
                        if (newJenis && ['inkul', 'eskul', 'pesantren'].includes(newJenis.toLowerCase())) await db.ref(`mapel/${id}/jenis`).set(newJenis.toLowerCase());
                        loadMapel();
                    };
                });
                document.querySelectorAll('.hapusMapelBtn').forEach(btn => {
                    btn.onclick = async () => {
                        if (confirm('Hapus mata pelajaran?')) {
                            await db.ref(`mapel/${btn.dataset.id}`).remove();
                            loadMapel();
                        }
                    };
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
            }
        }
        
        // ===================== PENUGASAN =====================
        async function loadPenugasan() {
            const container = document.getElementById('penugasan');
            try {
                const [mapelSnap, guruSnap, siswaSnap, kelasSnap, penugasanSnap] = await Promise.all([
                    db.ref('mapel').once('value'),
                    db.ref('guru').once('value'),
                    db.ref('siswa').once('value'),
                    db.ref('kelas').once('value'),
                    db.ref('penugasan').once('value')
                ]);
                const mapel = mapelSnap.val() || {};
                const guru = guruSnap.val() || {};
                const semuaSiswa = siswaSnap.val() || {};
                const kelasData = kelasSnap.val() || {};
                const daftarKelas = Object.keys(kelasData);
                const penugasan = penugasanSnap.val() || {};
                
                let formHtml = `
                    <div class="border p-4 rounded mb-6 bg-gray-50">
                        <h3 class="font-bold mb-2"><i class="fas fa-tasks"></i> Tambah Penugasan Baru</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                            <div><label class="block text-sm font-medium">Mata Pelajaran</label><select id="pilihMapel" class="border p-1 rounded w-full"><option value="">-- Pilih Mapel --</option>${Object.entries(mapel).map(([id, m]) => `<option value="${id}" data-jenis="${m.jenis}">${escapeHtml(m.nama)} (${m.jenis})</option>`).join('')}</select></div>
                            <div><label class="block text-sm font-medium">Guru Pengampu</label><select id="pilihGuru" class="border p-1 rounded w-full"><option value="">-- Pilih Guru --</option>${Object.keys(guru).map(g => `<option value="${g}">${escapeHtml(g)}</option>`).join('')}</select></div>
                            <div id="targetContainer"><label class="block text-sm font-medium" id="targetLabel">Target</label><div id="targetInput"></div></div>
                        </div>
                        <button id="simpanPenugasanBtn" class="bg-blue-600 text-white px-4 py-1 rounded"><i class="fas fa-save"></i> Simpan Penugasan</button>
                    </div>
                `;
                let listHtml = `<h3 class="font-bold mt-4">Daftar Penugasan Aktif</h3><div class="overflow-x-auto"><table class="min-w-full border mt-2"><thead class="bg-gray-100"><tr><th>Mapel</th><th>Guru</th><th>Siswa Terlibat</th><th>Aksi</th></tr></thead><tbody>`;
                for (let [id, pg] of Object.entries(penugasan)) {
                    const namaMapel = mapel[pg.mapelId]?.nama || '❌ Mapel dihapus';
                    const jumlahSiswa = pg.siswaList?.length || 0;
                    listHtml += `<tr><td class="p-2">${escapeHtml(namaMapel)}</td><td class="p-2">${escapeHtml(pg.guruName)}</td><td class="p-2">${jumlahSiswa} siswa</td><td class="p-2"><button class="hapusPenugasanBtn text-red-500" data-id="${id}"><i class="fas fa-trash"></i> Hapus</button></td></tr>`;
                }
                listHtml += `</tbody></table></div>`;
                container.innerHTML = formHtml + listHtml;
                
                const mapelSelect = document.getElementById('pilihMapel');
                const targetDiv = document.getElementById('targetInput');
                const targetLabel = document.getElementById('targetLabel');
                
                const updateTargetInput = () => {
                    const selectedOpt = mapelSelect.options[mapelSelect.selectedIndex];
                    const jenis = selectedOpt?.dataset?.jenis;
                    targetDiv.innerHTML = '';
                    if (jenis === 'inkul') {
                        targetLabel.innerText = 'Pilih Kelas (bisa lebih dari satu)';
                        const selectKelas = document.createElement('select');
                        selectKelas.multiple = true;
                        selectKelas.className = 'border p-1 rounded w-full';
                        selectKelas.size = 4;
                        selectKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>' + daftarKelas.map(k => `<option value="${k}">${escapeHtml(k)}</option>`).join('');
                        targetDiv.appendChild(selectKelas);
                    } else if (jenis === 'eskul' || jenis === 'pesantren') {
                        targetLabel.innerText = 'Pilih Siswa (bisa lebih dari satu, gabungan kelas)';
                        const selectSiswa = document.createElement('select');
                        selectSiswa.multiple = true;
                        selectSiswa.className = 'border p-1 rounded w-full';
                        selectSiswa.size = 6;
                        selectSiswa.innerHTML = Object.entries(semuaSiswa).map(([nis, s]) => `<option value="${nis}">${escapeHtml(nis)} - ${escapeHtml(s.nama)} (${s.kelas})</option>`).join('');
                        targetDiv.appendChild(selectSiswa);
                    } else {
                        targetLabel.innerText = 'Target';
                        targetDiv.innerHTML = '<p class="text-gray-500 text-sm">Pilih mapel terlebih dahulu</p>';
                    }
                };
                mapelSelect.onchange = updateTargetInput;
                
                document.getElementById('simpanPenugasanBtn').onclick = async () => {
                    const mapelId = mapelSelect.value;
                    const guruName = document.getElementById('pilihGuru').value;
                    if (!mapelId || !guruName) { alert('Pilih mapel dan guru'); return; }
                    const jenis = mapelSelect.options[mapelSelect.selectedIndex].dataset.jenis;
                    let siswaList = [];
                    if (jenis === 'inkul') {
                        const selectKelas = document.querySelector('#targetInput select');
                        const selectedKelas = Array.from(selectKelas.selectedOptions).map(opt => opt.value);
                        if (selectedKelas.length === 0) { alert('Pilih minimal satu kelas'); return; }
                        for (let k of selectedKelas) {
                            const siswaDiKelas = Object.entries(semuaSiswa).filter(([_, s]) => s.kelas === k).map(([nis]) => nis);
                            siswaList.push(...siswaDiKelas);
                        }
                        siswaList = [...new Set(siswaList)];
                    } else {
                        const selectSiswa = document.querySelector('#targetInput select');
                        siswaList = Array.from(selectSiswa.selectedOptions).map(opt => opt.value);
                        if (siswaList.length === 0) { alert('Pilih minimal satu siswa'); return; }
                    }
                    if (siswaList.length === 0) { alert('Tidak ada siswa yang dipilih'); return; }
                    await db.ref('penugasan').push({ mapelId, guruName, siswaList });
                    alert('Penugasan berhasil disimpan');
                    loadPenugasan();
                };
                
                document.querySelectorAll('.hapusPenugasanBtn').forEach(btn => {
                    btn.onclick = async () => {
                        if (confirm('Hapus penugasan ini?')) {
                            await db.ref(`penugasan/${btn.dataset.id}`).remove();
                            await db.ref(`nilai_kehadiran/${btn.dataset.id}`).remove();
                            loadPenugasan();
                        }
                    };
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Initial load all tabs
        loadMurid();
        loadGuru();
        loadMapel();
        loadPenugasan();
    </script>
</body>
</html>
