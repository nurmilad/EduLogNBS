    <style>
        /* ... (style yang sudah ada) ... */
        .tab-content { transition: all 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .table-wrapper { overflow-x: auto; border-radius: 0.75rem; }
        .kelas-card:active { transform: scale(0.98); }
        @media (max-width: 640px) {
            .container { padding-left: 0.75rem; padding-right: 0.75rem; }
            .table-wrapper table { font-size: 0.8rem; }
            .table-wrapper td, .table-wrapper th { padding: 0.5rem 0.25rem; }
        }
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #4f46e5;
            animation: spin 1s ease-in-out infinite;

        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;

        .modal-container {

            border-radius: 1rem;

            width: auto;
            max-height: 90vh;
            overflow: auto;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);

        @keyframes fadeIn {

        .modal-header {
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
            border-bottom: 1px solid #e5e7eb;
        }
        @media (max-width: 640px) {
            .modal-container { width: 98vw; }
            .modal-container table { font-size: 0.7rem; }
            .modal-container td, .modal-container th { padding: 0.4rem 0.2rem; }

        .member-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .member-item:hover {
            background-color: #f9fafb;
        }
        .remove-member {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            padding: 0 4px;
        }
        .remove-member:hover {
            color: #b91c1c;
        }
        .add-member-select {
            padding: 4px 8px;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            width: 100%;
        }
        .sortable-header {
            cursor: pointer;
            user-select: none;
        }
        .sortable-header:hover {
            background-color: #e5e7eb;
        }
        .sort-icon {
            margin-left: 4px;
            font-size: 0.7rem;
        }
        /* Tambahan untuk status badge */
        .status-badge {
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            transition: 0.1s ease;
        }
        .status-badge:active {
            transform: scale(0.94);
        }
        .status-aktif {
            background-color: #dcfce7;
            color: #15803d;
        }
        .status-tidak_aktif {
            background-color: #fee2e2;
            color: #b91c1c;

</head>

    <script>
        // ===== CEK LOGIN ADMIN =====
        if (!localStorage.getItem('adminLogin')) {
            window.location.href = 'index.html';
        }

        function logoutAdmin() {
            localStorage.removeItem('adminLogin');
            window.location.href = 'index.html';
        }

        // ===== KONFIGURASI FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyAEUxtP2D26eF5zS2sgR5_bpzK6SNRwQA0",
            authDomain: "edulognbs.firebaseapp.com",
            databaseURL: "https://edulognbs-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "edulognbs",
            storageBucket: "edulognbs.firebasestorage.app",
            messagingSenderId: "759345868898",
            appId: "1:759345868898:web:40487df20ab4f43045213b",
            measurementId: "G-SV83KDGZTS"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ===== FUNGSI GLOBAL =====
        function showError(msg) {
            console.error(msg);
            alert("Error: " + msg);
        }

        function parseDMY(dateStr) {
            if (!dateStr) return null;
            let parts = dateStr.split('/');
            if (parts.length === 3) {
                let d = parseInt(parts[0],10), m = parseInt(parts[1],10)-1, y = parseInt(parts[2],10);
                let date = new Date(y,m,d);
                if (!isNaN(date.getTime())) return date.getTime();
            }
            return null;
        }

        function formatDateToDMY(date) {
            let d = date.getDate().toString().padStart(2,'0');
            let m = (date.getMonth()+1).toString().padStart(2,'0');
            let y = date.getFullYear();
            return `${d}/${m}/${y}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
        }

        function attachCloseModal(modalEl) {
            const closeBtns = modalEl.querySelectorAll('.closeModalBtn');
            closeBtns.forEach(btn => {
                btn.onclick = () => modalEl.remove();
            });
            modalEl.addEventListener('click', (e) => {
                if (e.target === modalEl) modalEl.remove();
            });
        }

        // ===== TAB SWITCHING =====
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-link').forEach(btn => {
                btn.classList.remove('border-blue-600', 'text-blue-600');
                btn.classList.add('border-transparent', 'text-gray-500');
            });
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('border-blue-600', 'text-blue-600');
            if (tabId === 'murid') loadMuridListView();
            else if (tabId === 'guru') loadGuru();
            else if (tabId === 'mapel') loadMapel();
            else if (tabId === 'penugasan') loadPenugasan();
            else if (tabId === 'riwayat') loadRiwayat();
        }

        document.querySelectorAll('.tab-link').forEach(btn => {
            btn.onclick = () => showTab(btn.dataset.tab);
        });

        // ============================================================
        // 1. DATA MURID
        // ============================================================
        async function hitungSemuaStatistikSiswa() {
            const [penugasanSnap, attendanceSnap, penilaianSnap] = await Promise.all([
                db.ref('penugasan').once('value'),
                db.ref('attendance').once('value'),
                db.ref('penilaian').once('value')
            ]);
            const penugasan = penugasanSnap.val() || {};
            const attendanceAll = attendanceSnap.val() || {};
            const penilaianAll = penilaianSnap.val() || {};
            
            const penugasanPerSiswa = {};
            for (let [idPen, pg] of Object.entries(penugasan)) {
                if (pg.siswaList && Array.isArray(pg.siswaList)) {
                    for (let nis of pg.siswaList) {
                        if (!penugasanPerSiswa[nis]) penugasanPerSiswa[nis] = [];
                        penugasanPerSiswa[nis].push(idPen);
                    }
                }
            }
            
            const assessmentPerPenugasan = {};
            for (let [idPen, assessments] of Object.entries(penilaianAll)) {
                if (!assessmentPerPenugasan[idPen]) assessmentPerPenugasan[idPen] = [];
                for (let idAss of Object.keys(assessments)) {
                    assessmentPerPenugasan[idPen].push(idAss);
                }
            }
            
            const hasil = {};
            for (let [nis, listPen] of Object.entries(penugasanPerSiswa)) {
                let totalSesi = 0;
                let totalHadir = 0;
                for (let idPen of listPen) {
                    const sessions = attendanceAll[idPen] || {};
                    for (let ses of Object.values(sessions)) {
                        totalSesi++;
                        const status = ses.records?.[nis];
                        if (status === undefined || status === 'H') totalHadir++;
                    }
                }
                const kehadiranPersen = totalSesi === 0 ? 0 : Math.round((totalHadir / totalSesi) * 100);
                
                let totalNilai = 0;
                let jumlahAssessment = 0;
                for (let idPen of listPen) {
                    const listAss = assessmentPerPenugasan[idPen] || [];
                    for (let idAss of listAss) {
                        const nilai = penilaianAll[idPen]?.[idAss]?.scores?.[nis];
                        const nilaiFinal = (typeof nilai === 'number') ? nilai : 0;
                        totalNilai += nilaiFinal;
                        jumlahAssessment++;
                    }
                }
                const nilaiRata = jumlahAssessment === 0 ? 0 : Math.round(totalNilai / jumlahAssessment);
                hasil[nis] = { kehadiranPersen, nilaiRata };
            }
            return hasil;
        }

        async function loadMuridListView() {
            const container = document.getElementById('murid');
            container.innerHTML = `
                <div class="mb-4 flex justify-between items-center flex-wrap gap-2">
                    <button id="addKelasBtn" class="bg-green-500 text-white px-3 py-2 rounded text-sm"><i class="fas fa-plus"></i> Tambah Kelas</button>
                </div>
                <div id="kelasListGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                <div id="kelasDetailPanel" class="hidden"></div>
            `;
            try {
                const kelasSnap = await db.ref('kelas').once('value');
                const daftarKelas = Object.keys(kelasSnap.val() || {}).sort();
                const siswaSnap = await db.ref('siswa').once('value');
                const semuaMurid = siswaSnap.val() || {};
                const grid = document.getElementById('kelasListGrid');
                if (daftarKelas.length === 0) {
                    grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">Belum ada kelas. Klik "Tambah Kelas".</p>';
                } else {
                    grid.innerHTML = '';
                    for (let kelas of daftarKelas) {
                        const jumlahMurid = Object.values(semuaMurid).filter(m => m.kelas === kelas).length;
                        const card = document.createElement('div');
                        card.className = 'kelas-card bg-white border rounded-xl shadow-sm hover:shadow-md transition-all cursor-pointer overflow-hidden';
                        card.innerHTML = `
                            <div class="p-5 text-center" data-kelas="${kelas}">
                                <div class="text-3xl mb-2 text-blue-600"><i class="fas fa-users"></i></div>
                                <h3 class="font-bold text-lg">Kelas ${escapeHtml(kelas)}</h3>
                                <p class="text-gray-500 text-sm mt-1">${jumlahMurid} murid</p>
                                <div class="mt-3 flex justify-center gap-3">
                                    <button class="editKelasBtn text-blue-500 hover:text-blue-700" data-kelas="${kelas}"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="hapusKelasBtn text-red-500 hover:text-red-700" data-kelas="${kelas}"><i class="fas fa-trash"></i> Hapus</button>
                                </div>
                            </div>
                        `;
                        card.addEventListener('click', (e) => {
                            if (e.target.closest('.editKelasBtn') || e.target.closest('.hapusKelasBtn')) return;
                            openClassDetail(kelas);
                        });
                        grid.appendChild(card);
                    }
                }
                document.getElementById('addKelasBtn').onclick = () => {
                    const newKelas = prompt('Masukkan nama kelas baru:');
                    if (newKelas && newKelas.trim()) {
                        db.ref(`kelas/${newKelas.trim()}`).set({ nama: newKelas.trim() })
                            .then(() => loadMuridListView())
                            .catch(err => showError(err.message));
                    }
                };
                document.querySelectorAll('.editKelasBtn').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.stopPropagation();
                        const oldKelas = btn.dataset.kelas;
                        const newKelas = prompt('Masukkan nama kelas baru:', oldKelas);
                        if (newKelas && newKelas.trim() && newKelas !== oldKelas) {
                            try {
                                const siswaSnap = await db.ref('siswa').once('value');
                                const siswa = siswaSnap.val() || {};
                                const updates = {};
                                for (let nis in siswa) {
                                    if (siswa[nis].kelas === oldKelas) {
                                        updates[`siswa/${nis}/kelas`] = newKelas;
                                    }
                                }
                                updates[`kelas/${newKelas}`] = { nama: newKelas };
                                updates[`kelas/${oldKelas}`] = null;
                                await db.ref().update(updates);
                                loadMuridListView();
                            } catch (err) { showError(err.message); }
                        }
                    };
                });
                document.querySelectorAll('.hapusKelasBtn').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.stopPropagation();
                        const kelas = btn.dataset.kelas;
                        if (confirm(`Hapus kelas ${kelas} dan semua muridnya?`)) {
                            try {
                                const siswaSnap = await db.ref('siswa').once('value');
                                const siswa = siswaSnap.val() || {};
                                const updates = {};
                                for (let nis in siswa) {
                                    if (siswa[nis].kelas === kelas) {
                                        updates[`siswa/${nis}`] = null;
                                    }
                                }
                                updates[`kelas/${kelas}`] = null;
                                await db.ref().update(updates);
                                loadMuridListView();
                            } catch (err) { showError(err.message); }
                        }
                    };
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
            }
        }

        async function openClassDetail(kelas) {
            const gridDiv = document.getElementById('kelasListGrid');
            const detailDiv = document.getElementById('kelasDetailPanel');
            if (gridDiv) gridDiv.classList.add('hidden');
            if (detailDiv) {
                detailDiv.classList.remove('hidden');
                detailDiv.innerHTML = '<div class="text-center py-8"><div class="loading-spinner mx-auto mb-2"></div><p>Menghitung statistik kehadiran & nilai, harap tunggu...</p></div>';
            }
            const statsMap = await hitungSemuaStatistikSiswa();
            await renderClassDetail(kelas, statsMap);
        }

        // === FUNGSI TOGGLE STATUS ===
        async function toggleStatus(nis, element) {
            try {
                const snap = await db.ref(`siswa/${nis}/status`).once('value');
                let current = snap.val() || 'aktif';
                const newStatus = (current === 'aktif') ? 'tidak_aktif' : 'aktif';
                await db.ref(`siswa/${nis}/status`).set(newStatus);
                // Update tampilan
                const display = newStatus === 'aktif' ? 'Aktif' : 'Tidak Aktif';
                element.textContent = display;
                element.className = `status-badge status-${newStatus}`;
                // Jika ingin update otomatis di tabel lain, bisa reload detail, tapi lebih baik biarkan.
            } catch (err) {
                showError('Gagal mengubah status: ' + err.message);
            }
        }

        async function renderClassDetail(kelas, statsMap) {
            const detailDiv = document.getElementById('kelasDetailPanel');
            if (!detailDiv) return;
            try {
                const siswaSnap = await db.ref('siswa').once('value');
                const semuaMurid = siswaSnap.val() || {};
                let muridKelas = Object.entries(semuaMurid)
                    .filter(([_, m]) => m.kelas === kelas)
                    .map(([nis, m]) => ({ 
                        nis, 
                        nama: m.nama, 
                        password: m.password,
                        kehadiranGlobal: statsMap[nis]?.kehadiranPersen ?? 0,
                        nilaiGlobal: statsMap[nis]?.nilaiRata ?? 0,
                        status: m.status || 'aktif'  // default aktif jika belum ada
                    }));
                
                detailDiv.innerHTML = `
                    <div class="bg-white rounded-lg border p-4">
                        <div class="flex flex-wrap justify-between items-center mb-4 gap-3">
                            <div><h2 class="text-xl font-bold">Kelas ${escapeHtml(kelas)}</h2><p class="text-gray-500 text-sm">${muridKelas.length} murid</p></div>
                            <div class="flex gap-2 flex-wrap">
                                <button id="backToListBtn" class="bg-gray-500 text-white px-3 py-1 rounded text-sm"><i class="fas fa-arrow-left"></i> Kembali</button>
                                <button id="editKelasDetailBtn" class="bg-blue-500 text-white px-3 py-1 rounded text-sm"><i class="fas fa-edit"></i> Edit Kelas</button>
                                <button id="hapusKelasDetailBtn" class="bg-red-500 text-white px-3 py-1 rounded text-sm"><i class="fas fa-trash"></i> Hapus Kelas</button>
                            </div>
                        </div>
                        <div class="mb-3 flex flex-wrap gap-2">
                            <button id="tambahMuridDetailBtn" class="bg-blue-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-user-plus"></i> Tambah Murid</button>
                            <button id="importMuridDetailBtn" class="bg-gray-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-paste"></i> Import Data Murid</button>
                            <button id="rekapKehadiranBtn" class="bg-green-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-calendar-check"></i> Rekap Kehadiran</button>
                            <button id="nilaiMuridDetailBtn" class="bg-purple-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-chart-line"></i> Daftar Nilai Murid</button>
                        </div>
                        <div class="table-wrapper overflow-x-auto">
                            <table class="min-w-full border text-sm">
                                <thead class="bg-gray-100"><tr>
                                    <th class="p-2">NIS</th>
                                    <th>Nama</th>
                                    <th>Password</th>
                                    <th>Kehadiran (%)</th>
                                    <th>Rata Nilai</th>
                                    <th>Status</th>
                                    <th>Aksi</th>
                                </tr></thead>
                                <tbody id="detailMuridTbody">${muridKelas.map(m => {
                                    const statusDisplay = m.status === 'aktif' ? 'Aktif' : 'Tidak Aktif';
                                    const statusClass = `status-${m.status}`;
                                    return `
                                    <tr>
                                        <td class="p-2">${escapeHtml(m.nis)}</td>
                                        <td class="p-2">${escapeHtml(m.nama)}</td>
                                        <td class="p-2">${escapeHtml(m.password)}</td>
                                        <td class="p-2 font-bold ${m.kehadiranGlobal < 50 ? 'text-red-600' : 'text-green-600'}">${m.kehadiranGlobal}%</td>
                                        <td class="p-2 font-bold">${m.nilaiGlobal}</td>
                                        <td class="p-2">
                                            <span class="status-badge ${statusClass} cursor-pointer" data-nis="${m.nis}" onclick="toggleStatus('${m.nis}', this)">${statusDisplay}</span>
                                        </td>
                                        <td class="p-2">
                                            <button class="editMuridDetailBtn text-blue-500" data-nis="${m.nis}"><i class="fas fa-edit"></i></button>
                                            <button class="hapusMuridDetailBtn text-red-500 ml-2" data-nis="${m.nis}"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    `;
                                }).join('')}</tbody>
                            </table>
                        </div>
                    </div>
                `;
                
                // Event listeners untuk tombol yang sudah ada
                document.getElementById('backToListBtn').onclick = () => loadMuridListView();
                document.getElementById('editKelasDetailBtn').onclick = async () => {
                    const newKelas = prompt('Masukkan nama kelas baru:', kelas);
                    if (newKelas && newKelas.trim() && newKelas !== kelas) {
                        try {
                            const siswaSnap = await db.ref('siswa').once('value');
                            const siswa = siswaSnap.val() || {};
                            const updates = {};
                            for (let nis in siswa) if (siswa[nis].kelas === kelas) updates[`siswa/${nis}/kelas`] = newKelas;
                            updates[`kelas/${newKelas}`] = { nama: newKelas };
                            updates[`kelas/${kelas}`] = null;
                            await db.ref().update(updates);
                            openClassDetail(newKelas);
                        } catch (err) { showError(err.message); }
                    }
                };
                document.getElementById('hapusKelasDetailBtn').onclick = async () => {
                    if (confirm(`Hapus kelas ${kelas} dan semua muridnya?`)) {
                        try {
                            const siswaSnap = await db.ref('siswa').once('value');
                            const siswa = siswaSnap.val() || {};
                            const updates = {};
                            for (let nis in siswa) if (siswa[nis].kelas === kelas) updates[`siswa/${nis}`] = null;
                            updates[`kelas/${kelas}`] = null;
                            await db.ref().update(updates);
                            loadMuridListView();
                        } catch (err) { showError(err.message); }
                    }
                };
                document.getElementById('tambahMuridDetailBtn').onclick = () => {
                    const nis = prompt('NIS:'), nama = prompt('Nama:'), pass = prompt('Password:');
                    if (nis && nama && pass) db.ref(`siswa/${nis}`).set({ nama, password: pass, kelas, kehadiranGlobal: 0, nilaiGlobal: 0, status: 'aktif' }).then(()=>openClassDetail(kelas)).catch(showError);
                };
                document.getElementById('importMuridDetailBtn').onclick = async () => {
                    const rawData = prompt(`Impor banyak murid ke kelas ${kelas}\n\nFormat:\n- Untuk pemisah koma atau tab: NIS, NAMA, PASSWORD\n- Untuk pemisah spasi: NIS NAMA... PASSWORD (nama boleh lebih dari 1 kata, password adalah kata terakhir)\n\nContoh:\n2526001, Ahmad, 1234\n2526002\tBudi\t5678\n2627001 ABDUL SYARIEF SAFAR 1234`);
                    if (!rawData) return;
                    const lines = rawData.split(/\r?\n/);
                    let success = 0, error = 0, promises = [];
                    for (let line of lines) {
                        line = line.trim();
                        if (!line) continue;
                        let nis, nama, pass;
                        if (line.includes('\t')) {
                            const parts = line.split('\t').map(s => s.trim());
                            if (parts.length >= 3) {
                                nis = parts[0];
                                nama = parts[1];
                                pass = parts[2];
                            } else { error++; continue; }
                        } else if (line.includes(',')) {
                            const parts = line.split(',').map(s => s.trim());
                            if (parts.length >= 3) {
                                nis = parts[0];
                                nama = parts[1];
                                pass = parts[2];
                            } else { error++; continue; }
                        } else {
                            const parts = line.split(/\s+/).filter(s => s.length > 0);
                            if (parts.length < 3) { error++; continue; }
                            nis = parts[0];
                            pass = parts[parts.length - 1];
                            nama = parts.slice(1, parts.length - 1).join(' ');
                        }
                        if (!nis || !nama || !pass) { error++; continue; }
                        promises.push(
                            db.ref(`siswa/${nis}`).set({
                                nama: nama,
                                password: pass,
                                kelas: kelas,
                                kehadiranGlobal: 0,
                                nilaiGlobal: 0,
                                status: 'aktif'
                            }).catch(() => error++)
                        );
                        success++;
                    }
                    await Promise.all(promises);
                    alert(`✅ Selesai! Berhasil: ${success}, Gagal: ${error}`);
                    openClassDetail(kelas);
                };
                document.getElementById('nilaiMuridDetailBtn').onclick = () => {
                    showNilaiMuridModal(kelas);
                };
                document.getElementById('rekapKehadiranBtn').onclick = () => {
                    showRekapKehadiran(kelas);
                };
                
                // Edit dan hapus murid (tetap)
                document.querySelectorAll('.editMuridDetailBtn').forEach(btn=>{
                    btn.onclick = async () => {
                        const nis=btn.dataset.nis;
                        const snap=await db.ref(`siswa/${nis}`).once('value');
                        const data=snap.val();
                        const newNama=prompt('Nama baru:', data.nama);
                        const newPass=prompt('Password baru:', data.password);
                        if(newNama) await db.ref(`siswa/${nis}/nama`).set(newNama);
                        if(newPass) await db.ref(`siswa/${nis}/password`).set(newPass);
                        openClassDetail(kelas);
                    };
                });
                document.querySelectorAll('.hapusMuridDetailBtn').forEach(btn=>{
                    btn.onclick = async () => { if(confirm('Hapus murid ini?')){ await db.ref(`siswa/${btn.dataset.nis}`).remove(); openClassDetail(kelas); } };
                });
            } catch(err){ detailDiv.innerHTML=`<div class="text-red-500 p-4">Error: ${err.message}</div>`; }
        }
